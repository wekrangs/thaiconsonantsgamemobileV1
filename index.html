<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Sara - Mnemonic Match</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        #game-container {
            background-color: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 700px;
            width: 100%;
            box-sizing: border-box;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        #progress {
            font-size: 1.2rem;
            font-weight: bold;
            color: #27ae60;
            margin-bottom: 1.5rem;
        }
        #hint-box {
            font-size: 1.2rem;
            background-color: #ecf0f1;
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 5px solid #3498db;
        }
        .meaning-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 0.5rem;
        }
        .hint-text {
            color: #34495e;
            font-style: italic;
            line-height: 1.4;
        }
        /* Style for emphasized hint words */
        .hint-highlight {
            color: red;
            font-weight: bold;
        }
        #options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        button.option-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Added extra vertical padding to prevent top/bottom vowels from clipping */
            padding: 2rem 1rem; 
            border: 2px solid #bdc3c7;
            background-color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button.option-btn:hover {
            background-color: #e8f4fd;
            border-color: #3498db;
            transform: scale(1.02);
        }
        .thai-char {
            font-size: 4.5rem;
            font-family: 'Sarabun', sans-serif;
            color: #2c3e50;
            /* Changed from line-height: 1 to normal so floating vowels aren't crushed on Android */
            line-height: normal; 
            padding: 10px 0;
        }
        button.option-btn.correct {
            background-color: #2ecc71;
            border-color: #27ae60;
        }
        button.option-btn.correct .thai-char {
            color: white;
        }
        button.option-btn.wrong {
            background-color: #e74c3c;
            border-color: #c0392b;
        }
        button.option-btn.wrong .thai-char {
            color: white;
        }
        #feedback {
            margin-top: 1.5rem;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 30px;
        }
        #next-btn {
            margin-top: 1rem;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }
        #next-btn:hover {
            background-color: #2980b9;
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 600px) {
            #game-container {
                padding: 1.5rem 1rem;
            }
            h1 {
                font-size: 1.5rem;
            }
            #progress {
                font-size: 1rem;
                margin-bottom: 1rem;
            }
            #hint-box {
                padding: 1rem;
                margin-bottom: 1.5rem;
                min-height: 80px;
            }
            .meaning-text {
                font-size: 1.2rem;
            }
            .hint-text {
                font-size: 1rem;
            }
            #options {
                gap: 10px;
            }
            button.option-btn {
                padding: 1.5rem 0.5rem; /* Ensure padding remains generous on mobile */
            }
            .thai-char {
                font-size: 3.8rem; /* Scaled UP slightly from previous mobile version for readability */
            }
            #feedback {
                font-size: 1.1rem;
                margin-top: 1rem;
            }
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>Sara Match</h1>
    <div id="progress">Score: <span id="score">0</span> / 6</div>
    
    <div id="hint-box">
        <div class="meaning-text" id="meaning-display"></div>
        <div class="hint-text" id="hint-display"></div>
    </div>
    
    <div id="options">
        <button class="option-btn" onclick="checkAnswer(0)">
            <span class="thai-char" id="char-0"></span>
        </button>
        <button class="option-btn" onclick="checkAnswer(1)">
            <span class="thai-char" id="char-1"></span>
        </button>
        <button class="option-btn" onclick="checkAnswer(2)">
            <span class="thai-char" id="char-2"></span>
        </button>
        <button class="option-btn" onclick="checkAnswer(3)">
            <span class="thai-char" id="char-3"></span>
        </button>
    </div>

    <div id="feedback"></div>
    <button id="next-btn" onclick="loadNextQuestion()">Next Question</button>
</div>

<script>
    // 6 unique vowels
    const allVowels = [
        { char: '-า', pronounce: '-aa', hint: `Think of a man with the <span class='hint-highlight'>walking stick</span> saying "<span class='hint-highlight'>AA!</span> My back!"` },
        { char: '-ี', pronounce: '-ee', hint: `Think of an <span class='hint-highlight'>eagle</span> flying <span class='hint-highlight'>above</span> a consonant.` },
        { char: '-ู', pronounce: '-uu', hint: `Think of a <span class='hint-highlight'>U-Boat</span> (submarine) <span class='hint-highlight'>under</span> a consonant.` },
        { char: 'โ-', pronounce: '-oh', hint: `An <span class='hint-highlight'>OAK</span> tree spreads evenly to left and right. All tree vowels are always <span class='hint-highlight'>TALLER and IN FRONT OF</span> a consonant.` },
        { char: 'ไ-', pronounce: '-ai (spiky)', hint: `A spiky <span class='hint-highlight'>IVY</span> leaf! All tree vowels are always <span class='hint-highlight'>TALLER and IN FRONT OF</span> a consonant.` },
        { char: 'ใ-', pronounce: '-ai (curly)', hint: `A curly <span class='hint-highlight'>IVY</span> vines! All tree vowels are always <span class='hint-highlight'>TALLER and IN FRONT OF</span> a consonant.` }
    ];

    let score = 0;
    let currentPool = [];
    let wrongPool = [];
    let currentQuestion = null;
    let currentOptions = [];
    let correctIndex = -1;

    function shuffleArray(array) {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    function initGame() {
        score = 0;
        currentPool = shuffleArray(allVowels);
        wrongPool = [];
        document.getElementById('score').innerText = score;
        loadNextQuestion();
    }

    function loadNextQuestion() {
        // Reset UI
        document.getElementById('feedback').innerText = '';
        document.getElementById('next-btn').style.display = 'none';
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => {
            btn.classList.remove('correct', 'wrong');
            btn.disabled = false;
        });

        // Check if pool is empty
        if (currentPool.length === 0) {
            if (wrongPool.length === 0) {
                document.getElementById('game-container').innerHTML = `
                    <h1>Game Complete!</h1>
                    <h2 style="color: #27ae60;">Final Score: 6 / 6</h2>
                    <p>All vowels mastered.</p>
                    <button id="next-btn" style="display:inline-block;" onclick="location.reload()">Play Again</button>
                `;
                return;
            } else {
                // Loop the wrong answers
                currentPool = shuffleArray(wrongPool);
                wrongPool = [];
            }
        }

        currentQuestion = currentPool.pop();
        
        // Pick 3 random distractors from the FULL list
        let distractors = allVowels.filter(v => v.char !== currentQuestion.char);
        distractors = shuffleArray(distractors).slice(0, 3);
        
        // Combine and shuffle options
        currentOptions = shuffleArray([currentQuestion, ...distractors]);
        correctIndex = currentOptions.findIndex(v => v.char === currentQuestion.char);

        // Update UI Text
        document.getElementById('meaning-display').innerText = `Find: ${currentQuestion.pronounce}`;
        document.getElementById('hint-display').innerHTML = `Hint: ${currentQuestion.hint}`;
        
        currentOptions.forEach((opt, index) => {
            document.getElementById(`char-${index}`).innerText = opt.char;
        });
    }

    function checkAnswer(selectedIndex) {
        const buttons = document.querySelectorAll('.option-btn');
        const feedback = document.getElementById('feedback');
        
        buttons.forEach(btn => btn.disabled = true);

        if (selectedIndex === correctIndex) {
            score++;
            document.getElementById('score').innerText = score;
            buttons[selectedIndex].classList.add('correct');
            feedback.innerText = "Correct! Great job."; 
            feedback.style.color = "#27ae60";
        } else {
            wrongPool.push(currentQuestion); 
            buttons[selectedIndex].classList.add('wrong');
            buttons[correctIndex].classList.add('correct');
            
            const correctAnswer = currentOptions[correctIndex];
            feedback.innerText = `Incorrect. The correct answer is ${correctAnswer.char} (${correctAnswer.pronounce}).`;
            feedback.style.color = "#c0392b";
        }

        document.getElementById('next-btn').style.display = 'inline-block';
    }

    // Start game
    initGame();
</script>

</body>
</html>
